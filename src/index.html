<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terrarium</title>
  <style>
    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 135deg;
      inherits: false;
    }
    :root {
      /* Color tokens */
      --bg-deep: #1e1035;
      --bg-dark: #2d1854;
      --bg-error: #1a1a2e;
      --primary-dark: #6d28d9;
      --primary: #7c3aed;
      --primary-light: #8b5cf6;
      --accent: #a78bfa;
      --text-heading: #e9d5ff;
      --text-body: #c4b5fd;
      --text-muted: #8b7aab;
      --text-dim: #6b5a8a;
      --text-detail: #ccc;
      --text-icon: #888;
      --text-white: #fff;
      --error: #e74c3c;
      --error-text: #ff6b6b;
      --warning: #fbbf24;
      --warning-border: #f59e0b;
      --warning-bg-start: #3b1a0a;
      --warning-bg-end: #2a1000;
      /* Type scale — 4 levels, ~1.25 ratio */
      --font-display: 1.75rem;
      --font-body: 0.8125rem;
      --font-caption: 0.6875rem;
      --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; font-family: -apple-system, system-ui, sans-serif; }
    #root { min-height: 100vh; transition: opacity 0.2s; }
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
      background: linear-gradient(var(--gradient-angle), var(--bg-deep) 0%, var(--bg-dark) 50%, var(--bg-deep) 100%);
      color: var(--text-body);
      user-select: none;
      position: relative;
      overflow: hidden;
      animation: ambient-light 25s ease-in-out infinite;
    }
    #welcome > svg {
      width: min(96px, 15vh);
      height: min(96px, 15vh);
      margin-bottom: min(24px, 3vh);
      opacity: 0;
      flex-shrink: 0;
      animation: welcome-float 3s ease-in-out infinite, welcome-logo-in 0.6s ease-out 0.1s forwards;
    }
    #welcome h1 {
      font-size: var(--font-display);
      font-weight: 600;
      color: var(--text-heading);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      opacity: 0;
      animation: welcome-in 0.5s ease-out 0.25s forwards;
    }
    #welcome p {
      font-size: var(--font-body);
      color: var(--text-muted);
      margin-bottom: min(32px, 4vh);
      opacity: 0;
      animation: welcome-in 0.5s ease-out 0.35s forwards;
    }
    #open-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--text-white);
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
      opacity: 0;
      animation: welcome-in 0.5s ease-out 0.45s forwards;
    }
    #open-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.45);
    }
    #open-btn:active { transform: scale(0.98); }
    #drop-hint {
      margin-top: 20px;
      font-size: var(--font-caption);
      color: var(--text-dim);
      opacity: 0;
      animation: welcome-in 0.4s ease-out 0.55s forwards;
    }
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.2s;
      overflow: hidden;
      background: rgba(124, 58, 237, 0.2);
    }
    #progress-bar.visible { opacity: 1; }
    #progress-bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
      animation: progress-shimmer 1.5s ease-in-out infinite;
    }
    @keyframes welcome-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes welcome-logo-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 0.85; transform: translateY(0); }
    }
    @keyframes welcome-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes progress-shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes progress-done {
      0% { opacity: 1; }
      50% { opacity: 1; background: var(--accent); }
      100% { opacity: 0; }
    }
    #progress-status {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 16, 53, 0.92);
      color: var(--text-body);
      font-size: var(--font-caption);
      padding: 4px 14px;
      border-radius: 6px;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      pointer-events: none;
      border: 1px solid rgba(124, 58, 237, 0.3);
    }
    #progress-status.visible { opacity: 1; }
    #node-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, var(--warning-bg-start), var(--warning-bg-end));
      color: var(--warning);
      font-size: var(--font-body);
      padding: 10px 20px;
      text-align: center;
      z-index: 10000;
      border-bottom: 1px solid var(--warning-border);
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    #node-banner.visible { display: flex; }
    #node-banner-icon { font-size: 16px; }
    #node-banner-link {
      color: var(--warning);
      text-decoration: underline;
      margin-left: 4px;
    }
    #node-banner-close {
      background: none;
      border: none;
      color: var(--warning);
      cursor: pointer;
      font-size: 18px;
      margin-left: 12px;
      padding: 4px 8px;
      min-width: 32px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 16, 53, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 3px dashed var(--accent);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-heading);
    }
    #drop-overlay .drop-sub {
      font-size: var(--font-body);
      font-weight: 400;
      color: var(--text-muted);
    }
    #drop-overlay.visible { display: flex; }
    #first-run-hint {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(124, 58, 237, 0.95);
      color: var(--text-white);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: var(--font-body);
      z-index: 9997;
      gap: 12px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    #first-run-hint.visible { display: flex; }
    #first-run-dismiss {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: var(--text-white);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: var(--font-caption);
    }
    #first-run-dismiss:hover { background: rgba(255, 255, 255, 0.3); }
    #error-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-error);
      border-top: 2px solid var(--error);
      color: var(--error-text);
      font-family: var(--font-mono);
      font-size: var(--font-body);
      z-index: 9999;
      transform: translateY(100%);
      transition: transform 0.2s ease-out;
      contain: layout style;
    }
    #error-banner.visible { transform: translateY(0); }
    #error-header {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
    }
    #error-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #error-title::before {
      content: '\2715';
      color: var(--error);
      font-size: 14px;
    }
    #error-toggle {
      color: var(--text-icon);
      font-size: 16px;
    }
    #error-detail {
      padding: 0 16px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: min(200px, 30vh);
      overflow-y: auto;
      color: var(--text-detail);
      line-height: 1.5;
    }
    #plant-shelf {
      margin-top: min(32px, 4vh);
      text-align: center;
      width: 100%;
      max-width: 500px;
    }
    #shelf-label {
      font-size: var(--font-caption);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    #shelf-plants-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #shelf-plants {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px 20px;
      padding: 0 12px;
      min-height: 80px;
      align-items: flex-end;
    }
    .shelf-sparkle {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }
    @media (max-width: 400px) {
      .shelf-sparkle { display: none; }
    }
    .sparkle-left { align-self: flex-start; margin-top: 8px; }
    .sparkle-right { align-self: flex-end; margin-bottom: 16px; }
    @keyframes plant-sprout {
      from { opacity: 0; transform: translateY(8px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .plant-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
      background: none;
      border: none;
      padding: 4px;
      font: inherit;
      color: inherit;
      opacity: 0;
      animation: plant-sprout 0.35s ease-out forwards;
    }
    .plant-item .plant-svg {
      width: 48px;
      height: 56px;
      transition: transform 0.2s;
    }
    .plant-item:hover .plant-svg,
    .plant-item:focus-visible .plant-svg {
      animation: wiggle 0.4s ease-in-out;
    }
    .plant-item:focus-visible {
      outline: none;
      border-radius: 8px;
      box-shadow: 0 0 0 2px var(--accent);
    }
    .plant-name {
      font-size: var(--font-caption);
      color: var(--text-dim);
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .plant-item:hover .plant-name,
    .plant-item:focus-visible .plant-name {
      opacity: 1;
      color: var(--text-body);
    }
    #shelf-line {
      width: min(280px, 80%);
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, transparent 20%, #a78bfa44 35%, #a78bfacc 50%, #a78bfa44 65%, transparent 80%, transparent 100%);
      background-size: 300% 100%;
      margin: 4px auto 0;
      border-radius: 1px;
      animation: shelf-shimmer 4s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-4deg); }
      40% { transform: rotate(4deg); }
      60% { transform: rotate(-2deg); }
      80% { transform: rotate(2deg); }
    }
    #plant-empty {
      margin-top: min(32px, 4vh);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .watering-can {
      width: 56px;
      height: 56px;
      opacity: 0.6;
    }
    .empty-hint {
      font-size: var(--font-caption);
      color: var(--text-dim);
      font-style: italic;
    }
    #update-toast {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-deep));
      border: 1px solid var(--primary);
      border-radius: 10px;
      padding: 14px 18px;
      z-index: 10001;
      contain: layout style;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      color: var(--text-body);
      font-size: var(--font-body);
      max-width: 300px;
      animation: toast-in 0.3s ease-out;
    }
    #update-toast.visible { display: block; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #update-toast-message {
      margin-bottom: 10px;
      line-height: 1.4;
    }
    #update-toast-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #update-toast-actions button {
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: var(--font-caption);
      cursor: pointer;
      font-weight: 500;
    }
    .update-primary-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--text-white);
    }
    .update-primary-btn:hover { background: linear-gradient(135deg, var(--primary-light), var(--primary)); }
    .update-dismiss-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }
    .update-dismiss-btn:hover { background: rgba(255, 255, 255, 0.15); color: var(--text-body); }
    .update-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--primary);
      border-top-color: var(--text-body);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    /* Overdrive: ambient light + particles */
    @keyframes ambient-light {
      0%, 100% { --gradient-angle: 135deg; }
      33% { --gradient-angle: 210deg; }
      66% { --gradient-angle: 70deg; }
    }
    #terrarium-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #welcome > svg,
    #welcome > h1,
    #welcome > p,
    #welcome > #open-btn,
    #welcome > #drop-hint,
    #welcome > #plant-shelf,
    #welcome > #plant-empty {
      position: relative;
      z-index: 1;
    }
    .sparkle-star {
      animation: sparkle-twinkle 2.5s ease-in-out infinite;
    }
    @keyframes sparkle-twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    #glass-highlight {
      animation: glass-breathe 5s ease-in-out infinite;
    }
    @keyframes glass-breathe {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.32; }
    }
    @keyframes shelf-shimmer {
      0%, 100% { background-position: 100% 0; }
      50% { background-position: -100% 0; }
    }
  </style>
</head>
<body>
  <main id="root">
    <div id="welcome" role="region" aria-label="Welcome">
      <canvas id="terrarium-canvas" aria-hidden="true"></canvas>
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="wPanelTL" x1="0" y1="1" x2="0.8" y2="0">
            <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.65"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="wPanelTR" x1="1" y1="1" x2="0.2" y2="0">
            <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.35"/>
          </linearGradient>
          <linearGradient id="wPanelBL" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.3"/>
          </linearGradient>
          <linearGradient id="wPanelBR" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.45"/>
          </linearGradient>
        </defs>
        <!-- Ambient glow -->
        <ellipse cx="256" cy="280" rx="175" ry="195" fill="#4a2080" opacity="0.4"/>
        <!-- Terrarium base -->
        <path d="M 256 52 L 100 240 L 128 395 L 256 462 L 384 395 L 412 240 Z" fill="#1e1040"/>
        <!-- Panels -->
        <path d="M 256 52 L 100 240 L 256 240 Z" fill="url(#wPanelTL)" stroke="#a88de0" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 256 52 L 256 240 L 412 240 Z" fill="url(#wPanelTR)" stroke="#a88de0" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 100 240 L 128 395 L 256 462 L 256 240 Z" fill="url(#wPanelBL)" stroke="#a88de0" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 256 240 L 256 462 L 384 395 L 412 240 Z" fill="url(#wPanelBR)" stroke="#a88de0" stroke-width="3" stroke-linejoin="round"/>
        <line x1="100" y1="240" x2="412" y2="240" stroke="#a88de0" stroke-width="3"/>
        <!-- Glass highlight -->
        <path id="glass-highlight" d="M 210 110 L 160 200 L 225 210 Z" fill="#f0eaff"/>
        <!-- Code brackets -->
        <path d="M 205 280 L 168 318 L 205 356" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 272 274 L 240 362" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
        <path d="M 307 280 L 344 318 L 307 356" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Sparkles -->
        <path class="sparkle-star" style="animation-duration:2.5s" transform="translate(408,105)" d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z" fill="#ff8ad0"/>
        <path class="sparkle-star" style="animation-duration:3.2s;animation-delay:0.7s" transform="translate(88,140)" d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#f5b0e0"/>
        <path class="sparkle-star" style="animation-duration:2.8s;animation-delay:1.3s" transform="translate(430,310)" d="M 0 -9 L 2.2 -2.2 L 9 0 L 2.2 2.2 L 0 9 L -2.2 2.2 L -9 0 L -2.2 -2.2 Z" fill="#ff85c8"/>
        <path class="sparkle-star" style="animation-duration:3.5s;animation-delay:0.4s" transform="translate(72,350)" d="M 0 -7 L 1.8 -1.8 L 7 0 L 1.8 1.8 L 0 7 L -1.8 1.8 L -7 0 L -1.8 -1.8 Z" fill="#ffc0e8"/>
      </svg>
      <h1>Terrarium</h1>
      <p>A tiny terrarium to view your React components</p>
      <button id="open-btn">Open File</button>
      <span id="drop-hint">or drag and drop a .tsx or .jsx file onto the app</span>
      <div id="plant-shelf" style="display: none;">
        <div id="shelf-label">Recent</div>
        <div id="shelf-plants-wrapper">
          <svg class="shelf-sparkle sparkle-left" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg"><path d="M 7 0 L 8.5 5.5 L 14 7 L 8.5 8.5 L 7 14 L 5.5 8.5 L 0 7 L 5.5 5.5 Z" fill="#ff8ad0" opacity="0.5"/></svg>
          <div id="shelf-plants"></div>
          <svg class="shelf-sparkle sparkle-right" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg"><path d="M 5 0 L 6.2 3.8 L 10 5 L 6.2 6.2 L 5 10 L 3.8 6.2 L 0 5 L 3.8 3.8 Z" fill="#f5b0e0" opacity="0.4"/></svg>
        </div>
        <div id="shelf-line"></div>
      </div>
      <div id="plant-empty" style="display: none;">
        <svg class="watering-can" viewBox="0 0 511.993 511.993" xmlns="http://www.w3.org/2000/svg">
          <!-- Spout arm and handle -->
          <path style="fill:#a78bfa;" d="M151.279,295.741L38.787,183.248c-3.172-3.172-4.919-7.424-4.919-11.974 c0-4.55,1.746-8.804,4.919-11.975c3.302-3.302,7.637-4.952,11.975-4.952c4.335,0,8.674,1.651,11.974,4.952l88.543,88.543v-47.897 l-64.595-64.595c-19.807-19.807-52.038-19.807-71.846,0C5.27,144.92,0,157.679,0,171.275c0,13.596,5.27,26.354,14.839,35.922 l136.44,136.441V295.741z"/>
          <!-- Spout nozzle -->
          <polygon style="fill:#a78bfa;" points="446.791,162.197 211.496,357.976 293.62,440.099 489.399,204.805"/>
          <!-- Spout connector -->
          <rect x="394.023" y="178.536" transform="matrix(-0.7071 -0.7071 0.7071 -0.7071 640.4173 656.2094)" style="fill:#8b5cf6;" width="124.183" height="33.868"/>
          <!-- Can body left -->
          <polygon style="fill:#7c3aed;" points="252.884,168.504 99.971,168.504 87.21,462.03 252.884,462.03"/>
          <!-- Can body right -->
          <polygon style="fill:#6d28d9;" points="206.597,462.03 325.793,462.03 313.03,168.504 206.597,168.504"/>
          <!-- Handle -->
